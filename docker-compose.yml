# Docker Compose — local development only
# For production: use strong passwords, external database, and HTTPS
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newgen
      POSTGRES_PASSWORD: newgen          # CHANGE THIS for production
      POSTGRES_DB: newgen_realty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://newgen:newgen@db:5432/newgen_realty
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  pgdata:
