[pytest]
testpaths = api ui
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    api: backend API workflow tests (no browser)
    ui: Playwright browser tests (requires frontend running)
    ai: requires ANTHROPIC_API_KEY; skipped otherwise
    slow: takes more than a few seconds
